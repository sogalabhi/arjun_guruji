name: Flutter Release to Play Store

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Set up Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Cache dependencies
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # 5. Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 6. Decode keystore (writing to android/app/ where it's expected)
      - name: Decode keystore file
        run: echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > android/app/release.keystore

      # 7. Create key.properties (with correct paths)
      - name: Create keystore.properties
        run: |
          echo "storeFile=release.keystore" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties

      # 8. Optimize Gradle memory and enable caching
      - name: Optimize Gradle build
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties

      # 9. Get dependencies
      - name: Get dependencies
        run: flutter pub get

      # 10. Build App Bundle
      - name: Build App Bundle
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      # 11. Validate AAB file
      - name: Validate AAB file
        run: |
          if [ ! -f build/app/outputs/bundle/release/app-release.aab ]; then
            echo "❌ AAB file not found!"
            exit 1
          fi
          echo "AAB file exists: $(ls -lh build/app/outputs/bundle/release/app-release.aab)"

      # 12. Upload to Play Store (r0adkll Action)
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: org.snsds.arjunguruji
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: internal
          status: draft
